# Configuration mapping for Informatica Activity Log fields to export to CSV.
# Set a field to true to include it as a column in the output CSV, or false to exclude it.

"@type": false
id: true
type: true
objectId: true
objectName: true
runId: true
runtimeEnvironmentId: true
startTime: true
endTime: true
startTimeUtc: false
endTimeUtc: false
state: true
UIState: false
failedSourceRows: true
successSourceRows: true
failedTargetRows: true
successTargetRows: true
errorMsg: true
startedBy: true
runContextType: false
totalSuccessRows: true
totalFailedRows: true
stopOnError: false
hasStopOnErrorRecord: false
parentTaskFederatedId: false
isStopped: false
contextExternalId: false
sessionVariables: false
taskRuntimeInfo: false
transformationEntries: false

# Parent tracking columns for nested sub-tasks
parent_id: true
parent_objectName: true

# Nested attributes inside logEntryItemAttrs
logEntryItemAttrs.CONSUMED_COMPUTE_UNITS: true
logEntryItemAttrs.DTM_PDO_TYPE: false
logEntryItemAttrs.IS_SERVER_LESS: false
logEntryItemAttrs.OBJ_LOCATION: true
logEntryItemAttrs.REQUESTED_COMPUTE_UNITS: false
logEntryItemAttrs.SERVICE_TYPE: true
logEntryItemAttrs.TASK_UUID: false
logEntryItemAttrs.releaseVersion: false
